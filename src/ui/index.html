<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codex-proxy · Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="app"></div>

    <script type="module">
      const STORAGE_KEY = "codex-proxy:admin_key";
      const TABS = [
        ["overview", "Overview"],
        ["accounts", "Accounts"],
        ["keys", "Access Keys"],
        ["usage", "Usage"],
        ["config", "Config"],
        ["settings", "Settings"],
      ];

      function jsonPretty(value) {
        return JSON.stringify(value, null, 2);
      }

      function fmtBytes(n) {
        const v = Number(n || 0);
        if (!Number.isFinite(v) || v <= 0) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let i = 0;
        let x = v;
        while (x >= 1024 && i < units.length - 1) {
          x /= 1024;
          i++;
        }
        const digits = i === 0 ? 0 : i === 1 ? 1 : 2;
        return `${x.toFixed(digits)} ${units[i]}`;
      }

      function fmtTs(ts) {
        if (!ts) return "";
        try {
          return new Date(ts * 1000).toLocaleString();
        } catch {
          return String(ts);
        }
      }

      function normalizeHost(host) {
        if (!host) return "127.0.0.1";
        if (host === "0.0.0.0") return "127.0.0.1";
        return host;
      }

      function baseUrlFromApiUrl(apiUrl) {
        if (!apiUrl || typeof apiUrl !== "string") return "";
        const suffix = "/v1/responses";
        if (apiUrl.endsWith(suffix)) return apiUrl.slice(0, -suffix.length);
        return apiUrl.replace(/\/+$/, "");
      }

      function generateCodexConfigToml(state) {
        let cfg;
        try {
          cfg = JSON.parse(state.configJson || "{}");
        } catch {
          cfg = null;
        }

        const host = normalizeHost(cfg?.server?.host);
        const port = cfg?.server?.port || 8765;
        const codexProxyBaseUrl = `http://${host}:${port}/v1`;

        const tabcodeApiUrl = cfg?.providers?.tabcode?.api_url;
        const tabcodeBaseUrl = baseUrlFromApiUrl(tabcodeApiUrl) || "https://api2.tabcode.cc/openai";

        const openaiApiUrl = cfg?.providers?.openai?.api_url;
        const openaiBaseUrl = baseUrlFromApiUrl(openaiApiUrl) || "https://api.openai.com/v1";

        const lines = [];
        lines.push(`# Generated by codex-proxy UI Settings`);
        lines.push(`# Note: Codex reads provider secrets from environment variables.`);
        lines.push(`#       Launch VS Code from a shell session if needed.`);
        lines.push(``);
        lines.push(`model = "glm-5-turbo"`);
        lines.push(`model_provider = "codex-proxy"`);
        lines.push(`service_tier = "fast"`);
        lines.push(`disable_response_storage = true`);
        lines.push(`personality = "pragmatic"`);
        lines.push(``);
        lines.push(`[model_providers.codex-proxy]`);
        lines.push(`name = "openai"`);
        lines.push(`base_url = "${codexProxyBaseUrl}"`);
        lines.push(`wire_api = "responses"`);
        lines.push(`requires_openai_auth = false`);
        lines.push(`env_key = "CODEX_PROXY_API_KEY"`);
        lines.push(``);
        lines.push(`# Direct upstream providers (optional):`);
        lines.push(`[model_providers.tabcode]`);
        lines.push(`name = "openai"`);
        lines.push(`base_url = "${tabcodeBaseUrl}"`);
        lines.push(`wire_api = "responses"`);
        lines.push(`requires_openai_auth = true`);
        lines.push(`env_key = "TABCODE_API_KEY"`);
        lines.push(``);
        lines.push(`[model_providers.openai]`);
        lines.push(`name = "openai"`);
        lines.push(`base_url = "${openaiBaseUrl}"`);
        lines.push(`wire_api = "responses"`);
        lines.push(`requires_openai_auth = true`);
        lines.push(`env_key = "OPENAI_API_KEY"`);
        lines.push(``);
        lines.push(`[model_providers.openrouter]`);
        lines.push(`name = "openrouter"`);
        lines.push(`base_url = "https://openrouter.ai/api/v1"`);
        lines.push(`env_key = "OPENROUTER_API_KEY"`);
        lines.push(``);
        lines.push(`# Convenience (bash/zsh):`);
        lines.push(`# export CODEX_PROXY_API_KEY="..."`);
        lines.push(`# export TABCODE_API_KEY="..."`);
        lines.push(`# export OPENROUTER_API_KEY="..."`);
        return lines.join("\n");
      }

      async function copyText(state, text) {
        state.error = "";
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          state.error = `Copy failed: ${maskError(e)}`;
        }
      }

      function maskError(err) {
        if (!err) return "unknown error";
        if (typeof err === "string") return err;
        if (err.message) return err.message;
        try {
          return JSON.stringify(err);
        } catch {
          return String(err);
        }
      }

      function el(tag, attrs, ...children) {
        const node = document.createElement(tag);
        if (attrs) {
          for (const [k, v] of Object.entries(attrs)) {
            if (k === "class") node.className = v;
            else if (k === "text") node.textContent = v;
            else if (k === "html") node.innerHTML = v;
            else if (k === "value") node.value = v;
            else if (k === "checked") node.checked = !!v;
            else if (k === "disabled") node.disabled = !!v;
            else if (k.startsWith("on") && typeof v === "function") {
              node.addEventListener(k.slice(2), v);
            } else if (v === true) node.setAttribute(k, "");
            else if (v !== false && v != null) node.setAttribute(k, String(v));
          }
        }
        for (const c of children.flat()) {
          if (c == null) continue;
          if (typeof c === "string") node.appendChild(document.createTextNode(c));
          else node.appendChild(c);
        }
        return node;
      }

      function badge(ok, onText = "yes", offText = "no") {
        const text = ok ? onText : offText;
        const cls = ok
          ? "bg-emerald-500/20 text-emerald-200"
          : "bg-rose-500/20 text-rose-200";
        return el("span", { class: `rounded px-2 py-0.5 text-xs ${cls}`, text });
      }

      function mkHeaders(state) {
        const h = { "content-type": "application/json" };
        const key = (state.adminKey || "").trim();
        if (key) h["x-codex-proxy-key"] = key;
        return h;
      }

      async function apiGet(state, path) {
        state.error = "";
        const r = await fetch(path, { method: "GET", headers: mkHeaders(state) });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data?.error?.message || `${r.status} ${r.statusText}`);
        return data;
      }

      async function apiJson(state, method, path, body) {
        state.error = "";
        const r = await fetch(path, {
          method,
          headers: mkHeaders(state),
          body: JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data?.error?.message || `${r.status} ${r.statusText}`);
        return data;
      }

      async function refreshUsage(state) {
        const qs = new URLSearchParams({
          bucket_seconds: String(state.usageBucketSeconds || 300),
          window_seconds: String(state.usageWindowSeconds || 86400),
        });
        const series = await apiGet(state, `/api/usage/series?${qs.toString()}`);
        state.usageSeries = series.buckets || [];
        state.usageSeriesBucketSeconds = series.bucket_seconds || state.usageBucketSeconds || 300;
        state.usageSeriesWindowSeconds = series.window_seconds || state.usageWindowSeconds || 86400;
        state.usageUpdatedAt = Math.floor(Date.now() / 1000);

        const uk = await apiGet(state, "/api/usage/keys");
        state.usageKeys = uk.keys || [];
        const ua = await apiGet(state, "/api/usage/accounts");
        state.usageAccounts = ua.accounts || [];
      }

      function th(text) {
        return el("th", { class: "px-3 py-2", text });
      }

      function tdMono(text) {
        return el("td", { class: "px-3 py-2 font-mono text-xs", text: text || "" });
      }

      function statBox(label, value) {
        return el(
          "div",
          { class: "rounded-lg bg-slate-950/60 p-3" },
          el("div", { class: "text-xs text-slate-400", text: label }),
          el("div", { class: "mt-1 text-lg font-semibold", text: value })
        );
      }

      function card(title, right, children) {
        return el(
          "div",
          { class: "rounded-xl border border-slate-800 bg-slate-900/40 p-4" },
          el(
            "div",
            { class: "mb-3 flex items-center justify-between gap-3" },
            el("h2", { class: "text-sm font-semibold text-slate-100", text: title }),
            el("div", { class: "text-xs text-slate-400", text: right || "" })
          ),
          ...(children || [])
        );
      }

      function renderApp(root, state) {
        root.innerHTML = "";

        const header = el(
          "header",
          { class: "sticky top-0 z-10 border-b border-slate-800 bg-slate-950/70 backdrop-blur" },
          el(
            "div",
            {
              class:
                "mx-auto flex max-w-6xl flex-col gap-3 px-4 py-3 md:flex-row md:items-center md:justify-between",
            },
            el(
              "div",
              { class: "flex items-center gap-3" },
              el("div", { class: "h-9 w-9 rounded-xl bg-slate-800" }),
              el(
                "div",
                null,
                el("div", { class: "text-sm font-semibold", text: "codex-proxy Admin" }),
                el("div", {
                  class: "text-xs text-slate-400",
                  text: state.configPath ? `Config: ${state.configPath}` : "Config: (unknown)",
                })
              )
            ),
            el(
              "div",
              { class: "flex flex-col gap-2 md:flex-row md:items-center" },
              el("input", {
                class:
                  "w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 md:w-96",
                placeholder: "Access key (x-codex-proxy-key)",
                value: state.adminKey,
                oninput: (e) => {
                  state.adminKey = e.currentTarget.value;
                  localStorage.setItem(STORAGE_KEY, state.adminKey);
                },
              }),
              el(
                "button",
                {
                  class:
                    "rounded-lg bg-indigo-500 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-400 disabled:opacity-50",
                  disabled: state.busy ? true : null,
                  onclick: async () => {
                    await refreshAll(state, root);
                  },
                },
                "Refresh"
              )
            )
          )
        );

        const tabs = el(
          "div",
          { class: "flex flex-wrap gap-2" },
          TABS.map(([id, label]) =>
            el(
              "button",
              {
                class:
                  "rounded-lg px-3 py-1.5 text-sm " +
                  (state.tab === id
                    ? "bg-slate-100 text-slate-950"
                    : "bg-slate-800/60 text-slate-200 hover:bg-slate-800"),
                onclick: () => {
                  state.tab = id;
                  renderApp(root, state);
                },
              },
              label
            )
          )
        );

        const main = el("main", { class: "mx-auto grid max-w-6xl gap-4 px-4 py-4" }, tabs);
        if (state.error) {
          main.appendChild(
            el("div", {
              class: "rounded-xl border border-rose-900/60 bg-rose-950/40 p-3 text-sm text-rose-100",
              text: state.error,
            })
          );
        }

        if (state.tab === "overview") {
          main.appendChild(
            el(
              "div",
              { class: "grid gap-4 md:grid-cols-2" },
              card("Runtime", state.busy ? "busy" : "idle", [
                el(
                  "div",
                  { class: "grid grid-cols-2 gap-3 text-sm" },
                  statBox("Accounts", String((state.accountsSnapshot.accounts || []).length)),
                  statBox("Sticky bindings", String(state.accountsSnapshot.sticky_bindings || 0))
                ),
                el("div", {
                  class: "mt-3 text-xs text-slate-400",
                  text: "Admin APIs require an admin access key in config access.keys[].",
                }),
              ]),
              card("Notes", "", [
                el(
                  "ul",
                  { class: "list-disc pl-5 text-sm text-slate-200" },
                  el("li", {
                    text: "Incoming auth accepts x-codex-proxy-key, x-api-key, or Authorization: Bearer.",
                  }),
                  el("li", {
                    text: "For Z.AI Authorization passthrough, prefer x-codex-proxy-key for proxy auth.",
                  }),
                  el("li", { text: "Config save persists to the currently loaded config path." })
                ),
              ])
            )
          );
        }

        if (state.tab === "accounts") {
          const rows = (state.accountsSnapshot.accounts || []).map((a) =>
            el(
              "tr",
              null,
              tdMono(a.id),
              el("td", { class: "px-3 py-2", text: a.provider }),
              el("td", { class: "px-3 py-2" }, badge(!!a.alive, "healthy", "unhealthy")),
              el("td", { class: "px-3 py-2", text: String(a.consecutive_failures ?? "") }),
              el("td", { class: "px-3 py-2", text: String(a.cache_key_hits ?? "") }),
              el("td", { class: "px-3 py-2 font-mono text-xs", text: a.unhealthy_until || "" }),
              el("td", {
                class: "px-3 py-2 font-mono text-xs",
                text: a.auth?.api_key_masked || a.auth?.creds_path || a.auth?.auth_type || "",
              })
            )
          );

          main.appendChild(
            card("Account Health", "GET /api/accounts", [
              el(
                "div",
                { class: "overflow-auto" },
                el(
                  "table",
                  { class: "min-w-full text-sm" },
                  el(
                    "thead",
                    { class: "text-left text-xs text-slate-400" },
                    el(
                      "tr",
                      null,
                      th("ID"),
                      th("Provider"),
                      th("Alive"),
                      th("Failures"),
                      th("Cache hits"),
                      th("Unhealthy until"),
                      th("Auth")
                    )
                  ),
                  el("tbody", { class: "divide-y divide-slate-800" }, rows)
                )
              ),
            ])
          );
        }

        if (state.tab === "keys") {
          const createdBox = state.createdKey
            ? el(
                "div",
                { class: "mt-3 rounded-lg border border-slate-800 bg-slate-950/60 p-3" },
                el("div", { class: "text-xs text-slate-400", text: "New key (store it now):" }),
                el("div", {
                  class: "mt-1 font-mono text-xs break-all",
                  text: state.createdKey.plaintext || "",
                }),
                el(
                  "div",
                  { class: "mt-1 text-xs text-slate-400" },
                  "SHA256: ",
                  el("span", { class: "font-mono", text: state.createdKey.key_sha256 || "" })
                )
              )
            : null;

          const keysRows = (state.accessKeys || []).map((k) =>
            el(
              "tr",
              null,
              tdMono(k.id),
              el("td", { class: "px-3 py-2", text: k.role || "" }),
              el("td", { class: "px-3 py-2", text: k.enabled ? "yes" : "no" }),
              el("td", { class: "px-3 py-2", text: k.name || "" }),
              el("td", { class: "px-3 py-2 font-mono text-xs", text: k.key_sha256 || "" }),
              el(
                "td",
                { class: "px-3 py-2" },
                el(
                  "button",
                  {
                    class:
                      "rounded bg-rose-500/20 px-2 py-1 text-xs text-rose-200 hover:bg-rose-500/30 disabled:opacity-50",
                    disabled: state.busy ? true : null,
                    onclick: async () => {
                      await deleteAccessKey(state, root, k.id);
                    },
                  },
                  "Delete"
                )
              )
            )
          );

          main.appendChild(
            el(
              "div",
              { class: "grid gap-4 md:grid-cols-2" },
              card("Create Access Key", "POST /api/access-keys", [
                el(
                  "div",
                  { class: "grid gap-2 text-sm" },
                  el("label", { class: "text-xs text-slate-400", text: "ID (optional)" }),
                  el("input", {
                    class: "rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 font-mono text-xs",
                    value: state.newKeyId,
                    oninput: (e) => (state.newKeyId = e.currentTarget.value),
                  }),
                  el("label", { class: "mt-2 text-xs text-slate-400", text: "Name (optional)" }),
                  el("input", {
                    class: "rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm",
                    value: state.newKeyName,
                    oninput: (e) => (state.newKeyName = e.currentTarget.value),
                  }),
                  el("label", { class: "mt-2 text-xs text-slate-400", text: "Role" }),
                  el(
                    "select",
                    {
                      class: "rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm",
                      value: state.newKeyRole,
                      onchange: (e) => (state.newKeyRole = e.currentTarget.value),
                    },
                    el("option", { value: "api", text: "api" }),
                    el("option", { value: "admin", text: "admin" })
                  ),
                  el(
                    "label",
                    { class: "flex items-center gap-2" },
                    el("input", {
                      type: "checkbox",
                      checked: state.newKeyEnabled ? true : null,
                      onchange: (e) => (state.newKeyEnabled = e.currentTarget.checked),
                    }),
                    el("span", { text: "Enabled" })
                  ),
                  el(
                    "button",
                    {
                      class:
                        "mt-2 rounded-lg bg-indigo-500 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-400 disabled:opacity-50",
                      disabled: state.busy ? true : null,
                      onclick: async () => {
                        await createAccessKey(state, root);
                      },
                    },
                    "Create"
                  ),
                  createdBox
                ),
              ]),
              card("Existing Keys", "GET /api/access-keys", [
                el(
                  "div",
                  { class: "overflow-auto" },
                  el(
                    "table",
                    { class: "min-w-full text-sm" },
                    el(
                      "thead",
                      { class: "text-left text-xs text-slate-400" },
                      el("tr", null, th("ID"), th("Role"), th("Enabled"), th("Name"), th("Key SHA256"), th(""))
                    ),
                    el("tbody", { class: "divide-y divide-slate-800" }, keysRows)
                  )
                ),
              ])
            )
          );
        }

        if (state.tab === "usage") {
          const series = Array.isArray(state.usageSeries) ? state.usageSeries : [];
          const metric = state.usageMetric || "bytes";
          const values = series.map((b) => {
            const req = Number(b?.request_bytes || 0);
            const resp = Number(b?.response_bytes || 0);
            const r = Number(b?.requests || 0);
            return metric === "requests" ? r : req + resp;
          });
          const maxValue = Math.max(1, ...values);
          const totalRequests = series.reduce((a, b) => a + Number(b?.requests || 0), 0);
          const totalErrors = series.reduce((a, b) => a + Number(b?.errors || 0), 0);
          const totalReqBytes = series.reduce((a, b) => a + Number(b?.request_bytes || 0), 0);
          const totalRespBytes = series.reduce((a, b) => a + Number(b?.response_bytes || 0), 0);

          const bars = el(
            "div",
            { class: "flex h-44 items-end gap-px overflow-x-auto rounded-lg border border-slate-800 bg-slate-950/40 p-2" },
            series.map((b, idx) => {
              const v = values[idx] || 0;
              const h = Math.max(1, Math.round((v / maxValue) * 160));
              const ts = Number(b?.ts || 0);
              const reqBytes = Number(b?.request_bytes || 0);
              const respBytes = Number(b?.response_bytes || 0);
              const req = Number(b?.requests || 0);
              const err = Number(b?.errors || 0);
              const title =
                `${fmtTs(ts)}\n` +
                `requests: ${req}\n` +
                `errors: ${err}\n` +
                `request_bytes: ${fmtBytes(reqBytes)}\n` +
                `response_bytes: ${fmtBytes(respBytes)}\n` +
                `total_bytes: ${fmtBytes(reqBytes + respBytes)}`;
              return el("div", {
                class: "w-2 rounded-sm bg-indigo-500/60 hover:bg-indigo-400/80",
                title,
                style: `height:${h}px`,
              });
            })
          );

          const keyFilter = (state.usageKeyFilter || "").trim().toLowerCase();
          const keysSorted = (state.usageKeys || [])
            .filter((k) => {
              if (!keyFilter) return true;
              return String(k?.key_id || "").toLowerCase().includes(keyFilter);
            })
            .slice()
            .sort((a, b) => {
              const at = Number(a?.request_bytes || 0) + Number(a?.response_bytes || 0);
              const bt = Number(b?.request_bytes || 0) + Number(b?.response_bytes || 0);
              return bt - at;
            });

          const keysRows = keysSorted.map((k) => {
            const reqBytes = Number(k?.request_bytes || 0);
            const respBytes = Number(k?.response_bytes || 0);
            const totalBytes = reqBytes + respBytes;
            const providers = k?.by_provider && typeof k.by_provider === "object" ? k.by_provider : {};
            const providerText = Object.entries(providers)
              .sort((a, b) => Number(b[1] || 0) - Number(a[1] || 0))
              .map(([p, c]) => `${p}:${c}`)
              .join(", ");
            return el(
              "tr",
              null,
              tdMono(String(k?.key_id || "")),
              el("td", { class: "px-3 py-2 text-sm", text: String(k?.requests || 0) }),
              el("td", { class: "px-3 py-2 text-sm text-rose-200", text: String(k?.errors || 0) }),
              el("td", { class: "px-3 py-2 text-sm", text: fmtBytes(totalBytes) }),
              el("td", { class: "px-3 py-2 text-sm text-slate-300", text: fmtBytes(reqBytes) }),
              el("td", { class: "px-3 py-2 text-sm text-slate-300", text: fmtBytes(respBytes) }),
              el("td", { class: "px-3 py-2 text-xs text-slate-300", text: fmtTs(k?.last_seen_at || 0) }),
              el("td", { class: "px-3 py-2 text-xs text-slate-400", text: providerText })
            );
          });

          main.appendChild(
            el(
              "div",
              { class: "grid gap-4" },
              card("Total Usage", "GET /api/usage/series", [
                el(
                  "div",
                  { class: "grid gap-3" },
                  el(
                    "div",
                    { class: "flex flex-wrap items-center justify-between gap-2" },
                    el(
                      "div",
                      { class: "flex flex-wrap items-center gap-2" },
                      el("span", { class: "text-xs text-slate-400", text: "Window" }),
                      el(
                        "select",
                        {
                          class: "rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm",
                          value: String(state.usageWindowSeconds || 86400),
                          onchange: async (e) => {
                            state.usageWindowSeconds = Number(e.currentTarget.value || 86400);
                            await refreshUsageOnly(state, root);
                          },
                        },
                        el("option", { value: "3600", text: "1h" }),
                        el("option", { value: "21600", text: "6h" }),
                        el("option", { value: "86400", text: "24h" }),
                        el("option", { value: String(7 * 86400), text: "7d" })
                      ),
                      el("span", { class: "ml-2 text-xs text-slate-400", text: "Bucket" }),
                      el(
                        "select",
                        {
                          class: "rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm",
                          value: String(state.usageBucketSeconds || 300),
                          onchange: async (e) => {
                            state.usageBucketSeconds = Number(e.currentTarget.value || 300);
                            await refreshUsageOnly(state, root);
                          },
                        },
                        el("option", { value: "60", text: "1m" }),
                        el("option", { value: "300", text: "5m" }),
                        el("option", { value: "900", text: "15m" }),
                        el("option", { value: "3600", text: "1h" })
                      ),
                      el("span", { class: "ml-2 text-xs text-slate-400", text: "Metric" }),
                      el(
                        "select",
                        {
                          class: "rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm",
                          value: state.usageMetric || "bytes",
                          onchange: (e) => {
                            state.usageMetric = e.currentTarget.value || "bytes";
                            renderApp(root, state);
                          },
                        },
                        el("option", { value: "bytes", text: "bytes" }),
                        el("option", { value: "requests", text: "requests" })
                      )
                    ),
                    el(
                      "button",
                      {
                        class:
                          "rounded-lg bg-indigo-500 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-400 disabled:opacity-50",
                        disabled: state.busy ? true : null,
                        onclick: async () => {
                          await refreshUsageOnly(state, root);
                        },
                      },
                      "Refresh"
                    )
                  ),
                  el(
                    "div",
                    { class: "grid gap-3 md:grid-cols-4" },
                    statBox("Requests", String(totalRequests)),
                    statBox("Errors", String(totalErrors)),
                    statBox("Request bytes", fmtBytes(totalReqBytes)),
                    statBox("Response bytes", fmtBytes(totalRespBytes))
                  ),
                  el("div", { class: "text-xs text-slate-400", text: "Histogram bars show per-bucket totals. Bytes = request+response." }),
                  bars,
                  el("div", { class: "text-xs text-slate-500", text: state.usageUpdatedAt ? `Updated: ${fmtTs(state.usageUpdatedAt)}` : "" })
                ),
              ]),
              card("Key Usage", "GET /api/usage/keys", [
                el(
                  "div",
                  { class: "grid gap-2" },
                  el(
                    "div",
                    { class: "flex items-center justify-between gap-2" },
                    el("input", {
                      class: "w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm",
                      placeholder: "Filter by key id…",
                      value: state.usageKeyFilter || "",
                      oninput: (e) => {
                        state.usageKeyFilter = e.currentTarget.value;
                        renderApp(root, state);
                      },
                    }),
                    el("div", { class: "text-xs text-slate-500", text: `${keysSorted.length} keys` })
                  ),
                  el(
                    "div",
                    { class: "overflow-auto" },
                    el(
                      "table",
                      { class: "min-w-full text-sm" },
                      el(
                        "thead",
                        { class: "text-left text-xs text-slate-400" },
                        el(
                          "tr",
                          null,
                          th("Key ID"),
                          th("Requests"),
                          th("Errors"),
                          th("Total Bytes"),
                          th("Req Bytes"),
                          th("Resp Bytes"),
                          th("Last Seen"),
                          th("By Provider")
                        )
                      ),
                      el("tbody", { class: "divide-y divide-slate-800" }, keysRows)
                    )
                  )
                ),
              ]),
              card("Account Usage (raw)", "GET /api/usage/accounts", [
                el("pre", {
                  class:
                    "whitespace-pre-wrap break-words rounded-lg border border-slate-800 bg-slate-950/60 p-3 text-xs text-slate-200",
                  text: jsonPretty(state.usageAccounts || []),
                }),
              ])
            )
          );
        }

        if (state.tab === "config") {
          main.appendChild(
            card("Config Editor", "POST /api/config", [
              el(
                "div",
                { class: "grid gap-2" },
                el("textarea", {
                  class:
                    "h-[560px] w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 font-mono text-xs",
                  oninput: (e) => (state.configJson = e.currentTarget.value),
                }),
                el(
                  "div",
                  { class: "flex items-center justify-between" },
                  el("div", { class: "text-xs text-slate-400", text: "Edits apply immediately after saving." }),
                  el(
                    "button",
                    {
                      class:
                        "rounded-lg bg-indigo-500 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-400 disabled:opacity-50",
                      disabled: state.busy ? true : null,
                      onclick: async () => {
                        await saveConfig(state, root);
                      },
                    },
                    "Save"
                  )
                )
              ),
            ])
          );

          const textarea = main.querySelector("textarea");
          if (textarea) textarea.value = state.configJson || "";
        }

        if (state.tab === "settings") {
          let cfgOk = true;
          try {
            JSON.parse(state.configJson || "{}");
          } catch {
            cfgOk = false;
          }

          const toml = generateCodexConfigToml(state);

          main.appendChild(
            card("Codex CLI Settings", "Generate ~/.codex/config.toml", [
              el("div", {
                class: "text-sm text-slate-200",
                text:
                  "Generates a ~/.codex/config.toml template with correct env_key wiring. Codex expects secrets from environment variables.",
              }),
              cfgOk
                ? null
                : el("div", {
                    class:
                      "rounded-lg border border-rose-900/60 bg-rose-950/30 p-3 text-sm text-rose-100",
                    text: "Config JSON is not valid. Fix it in the Config tab first.",
                  }),
              el("textarea", {
                class:
                  "h-[560px] w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 font-mono text-xs",
                readonly: true,
              }),
              el(
                "div",
                { class: "flex items-center justify-end gap-2" },
                el(
                  "button",
                  {
                    class:
                      "rounded-lg bg-slate-800 px-3 py-2 text-sm font-semibold text-slate-100 hover:bg-slate-700 disabled:opacity-50",
                    disabled: state.busy ? true : null,
                    onclick: async () => {
                      await copyText(state, toml);
                      renderApp(root, state);
                    },
                  },
                  "Copy TOML"
                )
              ),
              el("div", {
                class: "text-xs text-slate-400",
                text:
                  "Tip: on macOS, launch VS Code from a shell session where you exported the env vars.",
              }),
            ])
          );

          const textarea = main.querySelector("textarea");
          if (textarea) textarea.value = toml;
        }

        root.appendChild(header);
        root.appendChild(main);
      }

      async function refreshAll(state, root) {
        state.busy = true;
        state.error = "";
        renderApp(root, state);
        if (!(state.adminKey || "").trim()) {
          state.error = "Access key required.";
          state.busy = false;
          renderApp(root, state);
          return;
        }
        try {
          const cfg = await apiGet(state, "/api/config");
          state.configPath = cfg.config_path || "";
          state.configJson = jsonPretty(cfg.config || {});

          const accounts = await apiGet(state, "/api/accounts");
          state.accountsSnapshot = accounts || { accounts: [], sticky_bindings: 0 };

          const keys = await apiGet(state, "/api/access-keys");
          state.accessKeys = keys.keys || [];

          await refreshUsage(state);
        } catch (e) {
          state.error = maskError(e);
        } finally {
          state.busy = false;
          renderApp(root, state);
        }
      }

      async function refreshUsageOnly(state, root) {
        state.busy = true;
        state.error = "";
        renderApp(root, state);
        try {
          await refreshUsage(state);
        } catch (e) {
          state.error = maskError(e);
        } finally {
          state.busy = false;
          renderApp(root, state);
        }
      }

      async function saveConfig(state, root) {
        state.busy = true;
        state.error = "";
        renderApp(root, state);
        try {
          const parsed = JSON.parse(state.configJson || "{}");
          const saved = await apiJson(state, "POST", "/api/config", parsed);
          state.configPath = saved.config_path || "";
          state.configJson = jsonPretty(saved.config || {});
        } catch (e) {
          state.error = maskError(e);
        } finally {
          state.busy = false;
          renderApp(root, state);
        }
      }

      async function createAccessKey(state, root) {
        state.busy = true;
        state.error = "";
        state.createdKey = null;
        renderApp(root, state);
        try {
          const resp = await apiJson(state, "POST", "/api/access-keys", {
            id: (state.newKeyId || "").trim() || null,
            name: (state.newKeyName || "").trim() || null,
            role: state.newKeyRole || "api",
            enabled: !!state.newKeyEnabled,
          });
          state.createdKey = resp || null;
          state.newKeyId = "";
          state.newKeyName = "";
          state.newKeyRole = "api";
          state.newKeyEnabled = true;
          const keys = await apiGet(state, "/api/access-keys");
          state.accessKeys = keys.keys || [];
        } catch (e) {
          state.error = maskError(e);
        } finally {
          state.busy = false;
          renderApp(root, state);
        }
      }

      async function deleteAccessKey(state, root, id) {
        state.busy = true;
        state.error = "";
        renderApp(root, state);
        try {
          const r = await fetch(`/api/access-keys/${encodeURIComponent(id)}`, {
            method: "DELETE",
            headers: mkHeaders(state),
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(data?.error?.message || `${r.status} ${r.statusText}`);
          const keys = await apiGet(state, "/api/access-keys");
          state.accessKeys = keys.keys || [];
        } catch (e) {
          state.error = maskError(e);
        } finally {
          state.busy = false;
          renderApp(root, state);
        }
      }

      const root = document.getElementById("app");
      const state = {
        adminKey: localStorage.getItem(STORAGE_KEY) || "",
        tab: "overview",
        error: "",
        busy: false,
        configPath: "",
        configJson: "{}",
        accountsSnapshot: { accounts: [], sticky_bindings: 0 },
        accessKeys: [],
        createdKey: null,
        usageKeys: [],
        usageAccounts: [],
        usageSeries: [],
        usageMetric: "bytes",
        usageBucketSeconds: 300,
        usageWindowSeconds: 86400,
        usageUpdatedAt: 0,
        usageKeyFilter: "",
        newKeyId: "",
        newKeyName: "",
        newKeyRole: "api",
        newKeyEnabled: true,
      };

      renderApp(root, state);
      refreshAll(state, root);
    </script>
  </body>
</html>
