# Example Codex config for routing through codex-proxy.
# Export CODEX_PROXY_API_KEY in your shell before launching Codex.

model = "glm-5-turbo"
model_provider = "codex-proxy"
service_tier = "fast"
disable_response_storage = true
personality = "pragmatic"

[model_providers.codex-proxy]
name = "openai"
base_url = "http://127.0.0.1:8765/v1"
wire_api = "responses"
requires_openai_auth = false
env_key = "CODEX_PROXY_API_KEY"

[model_providers.tabcode]
name = "openai"
base_url = "https://api2.tabcode.cc/openai"
wire_api = "responses"
requires_openai_auth = true
env_key = "TABCODE_API_KEY"

[model_providers.openai]
name = "openai"
base_url = "https://api.openai.com/v1"
wire_api = "responses"
requires_openai_auth = true
env_key = "OPENAI_API_KEY"

[model_providers.openrouter]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
