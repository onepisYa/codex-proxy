# Shared Codex config template for end-to-end tests.
# Tests render {port} at runtime and provide CODEX_PROXY_API_KEY via env.

model = "glm-5-turbo"
model_provider = "codex-proxy"
model_context_window = 128000
model_auto_compact_token_limit = 100000
service_tier = "fast"
disable_response_storage = true
personality = "pragmatic"
approvals_reviewer = "user"
# sandbox not enforced here; tests use --dangerously-bypass-approvals-and-sandbox
ephemeral = true

[model_providers.codex-proxy]
name = "openai"
base_url = "http://127.0.0.1:{port}/v1"
wire_api = "responses"
requires_openai_auth = false
env_key = "CODEX_PROXY_API_KEY"

[model_providers.tabcode]
name = "openai"
base_url = "https://api2.tabcode.cc/openai"
wire_api = "responses"
requires_openai_auth = true
env_key = "TABCODE_API_KEY"

[model_providers.openai]
name = "openai"
base_url = "https://api.openai.com/v1"
wire_api = "responses"
requires_openai_auth = true
env_key = "OPENAI_API_KEY"

[model_providers.openrouter]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
